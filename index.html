<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Social</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Mini Social</h1>
</header>

<main>

    <section class="perfil">

        <h2 id="nombrePerfil">Usuario</h2>

        <input
            type="text"
            id="nuevoNombre"
            placeholder="Escribe tu nombre">

        <button id="guardarNombre">
            Guardar nombre
        </button>

    </section>

    <section class="crear-post">

        <textarea
            id="contenido"
            placeholder="¿Qué estás pensando?">
        </textarea>

        <button id="publicar">
            Publicar
        </button>

    </section>

    <section id="feed">

    </section>

</main>

<script src="script.js"></script>

</body>
</html>
