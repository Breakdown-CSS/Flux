<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux</title>
    
    <link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="pantallaCarga">

    <img
        src="logocolor.png"
        id="logoCarga"
        alt="Flux">

</div>

<header>

    <img
        src="logopc.png"
        id="logoFlux"
        alt="Flux">

</header>

<main>

    <section id="registro">

    <h2>Bienvenido a Flux</h2>

<img
    id="previewRegistro"
    src="defaultprofile.png"
    alt="Vista previa">

    <label
        for="fotoRegistro"
        class="btn-imagen">

        Elegir foto de perfil

    </label>

    <input
        type="file"
        id="fotoRegistro"
        accept="image/*">

    <input
        type="text"
        id="nombreRegistro"
        placeholder="Nombre de usuario">

        <input
    type="text"
    id="usuarioRegistro"
    placeholder="@usuario">

    <button id="btnRegistro">
        Registrarse
    </button>

</section>

<div id="app">

<div class="contenedor-principal">

    <section class="perfil">

  <h2 id="nombrePerfil">Usuario</h2>

  <p id="usuarioPerfil">
    @usuario
</p>

<p id="biografiaPerfil">
    Sin biografía.
</p>

<p id="contadorPosts">
    Publicaciones: 0
</p>

<img
    id="avatar"
    src="defaultprofile"
    alt="Foto de perfil">

<input
    type="file"
    id="fotoPerfil"
    accept="image/*">

<textarea
    id="biografiaInput"
    placeholder="Escribe una biografía">
</textarea>

<button id="guardarBio">
    Guardar biografía
</button>

<button id="modoOscuro">
    🌙 Modo oscuro
</button>

    </section>

<div class="zona-feed">

<section class="crear-post">

<textarea id="contenido"
maxlength="280"
placeholder="¿Qué estás pensando?">
</textarea>

<button id="publicar">
    Publicar
</button>

</section>

<section id="feed">

</section>

</div>

</div>

</div>

</main>

<script src="script.js"></script>

</body>
</html>
