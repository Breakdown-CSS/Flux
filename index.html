<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Flux</title>
    
    <link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="pantallaCarga">

    <img
        src="logocolor.png"
        id="logoCarga"
        alt="Flux">

</div>

<header>

    <img
        src="logopc.png"
        id="logoFlux"
        alt="Flux">

</header>

<main>

    <section id="registro">

    <h2>Bienvenido a Flux</h2>

<img
    id="previewRegistro"
    src="defaultprofile.png"
    alt="Vista previa">

    <label
        for="fotoRegistro"
        class="btn-imagen">

        Elegir foto de perfil

    </label>

    <input
        type="file"
        id="fotoRegistro"
        accept="image/*">

<input
    type="text"
    id="nombreRegistro"
    maxlength="30"
    placeholder="Nombre de usuario">

<input
    type="text"
    id="usuarioRegistro"
    maxlength="15"
    placeholder="@usuario">

    <button id="btnRegistro">
        Registrarse
    </button>

</section>

<div id="app">

<div class="contenedor-principal">

    <section class="perfil">

<div class="nombre-con-insignia">

    <h2 id="nombrePerfil">Usuario</h2>

    <img
        id="insigniaVerificada"
        src="verificationbadge.png"
        alt="Verificado">

</div>

  <p id="usuarioPerfil">
    @usuario
</p>

<p id="biografiaPerfil">
    Sin biografía.
</p>

<p id="contadorPosts">
    Publicaciones: 0
</p>

<img
    id="avatar"
    src="defaultprofile.png"
    alt="Foto de perfil">

<label
    for="fotoPerfil"
    class="btn-imagen">

    Cambiar foto de perfil

</label>

<input
    type="file"
    id="fotoPerfil"
    accept="image/*">

<textarea
    id="biografiaInput"
    maxlength="160"
    placeholder="Escribe una biografía">
</textarea>

<button id="guardarBio">
    Guardar biografía
</button>

<button id="modoOscuro">
    🌙 Modo oscuro
</button>

<button id="abrirPerfil">
    👤 Ver mi perfil
</button>

    </section>

<div class="zona-feed">

<section class="crear-post">

<textarea id="contenido"
maxlength="280"
placeholder="¿Qué estás pensando?">
</textarea>

<button id="publicar">
    Publicar
</button>

</section>

<section id="feed">

</section>

</div>

</div>

<section id="perfilCompleto" style="display:none;">

    <button id="volverInicio">
        ← Volver al inicio
    </button>

    <div class="perfil">
        <img
            id="perfilCompletoAvatar"
            src="defaultprofile.png"
            alt="Foto de perfil">

<div class="nombre-con-insignia">

    <h2 id="perfilCompletoNombre">
        Usuario
    </h2>

    <img
        id="insigniaVerificadaCompleta"
        src="verificationbadge.png"
        alt="Verificado">

</div>

        <p id="perfilCompletoUsuario">
            @usuario
        </p>

        <p id="perfilCompletoBio">
            Sin biografía.
        </p>

        <p id="perfilCompletoContador">
            Publicaciones: 0
        </p>

<section id="perfilCompletoPosts">

</section>

</div> <!-- cierre del div perfil completo -->

</section> <!-- cierre de perfilCompleto -->

</main>

<div id="notificacion" class="notificacion">
    ✓ Publicación creada
</div>

<script src="script.js"></script>

</body>
</html>
